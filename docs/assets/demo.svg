<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="880" height="430" rx="10" fill="#0d1117"/>
  <rect width="880" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="440" y="21" fill="#8b949e" text-anchor="middle">shapepin — did the API response quietly change shape?</text>

  <text x="24" y="64" fill="#7ee787">$ shapepin pin orders captures/*.json --tolerate "/orders/*/note=optional"</text>
  <text x="24" y="86" fill="#c9d1d9" xml:space="preserve">pinned "orders" from 3 examples → __shapepins__/orders.pin.json</text>

  <text x="24" y="116" fill="#8b949e"># …weeks later, CI checks the live response against the pin…</text>

  <text x="24" y="148" fill="#7ee787">$ curl -s http://127.0.0.1:8080/orders | shapepin check orders -</text>
  <text x="24" y="172" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">✗</tspan> stdin — 4 drift issues</text>
  <text x="24" y="194" fill="#c9d1d9" xml:space="preserve">  /orders/0/items/0/price     <tspan fill="#d29922">type-changed</tspan>    pinned number, got string ("12.99")</text>
  <text x="24" y="214" fill="#c9d1d9" xml:space="preserve">  /orders/0/items/0/discount  <tspan fill="#d29922">new-field</tspan>       field "discount" was never in a pinned example</text>
  <text x="24" y="234" fill="#c9d1d9" xml:space="preserve">  /orders/0/placedAt          <tspan fill="#d29922">format-changed</tspan>  pinned iso-date-time string, got "tomorrow"</text>
  <text x="24" y="254" fill="#c9d1d9" xml:space="preserve">  /orders/0/status            <tspan fill="#d29922">new-enum-value</tspan>  "canceled" is not one of "delivered" | "pending" | "shipped"</text>
  <text x="24" y="276" fill="#f85149" xml:space="preserve">0 clean, 1 drifted, 4 issues · pin "orders" (3 examples, 1 tolerance)</text>
  <text x="24" y="298" fill="#8b949e">exit 1 — the frontend would have found out in production; CI found out first</text>

  <text x="24" y="330" fill="#8b949e"># the status change was intentional? tolerate exactly that, nothing else:</text>
  <text x="24" y="352" fill="#7ee787">$ shapepin tolerate orders "/orders/*/status=open-enum"</text>
  <text x="24" y="374" fill="#c9d1d9" xml:space="preserve">added to "orders": /orders/*/status  open-enum</text>
  <text x="24" y="402" fill="#28c840" xml:space="preserve">no spec to write, no schema to maintain — the captures you already have are the contract</text>
</svg>
